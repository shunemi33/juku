<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塾バイト給与計算アプリ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="給料計算">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        h3 {
            margin-top: 0;
            color: #34495e;
            border-bottom: 2px solid #bdc3c7;
            padding-bottom: 5px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        label {
            font-weight: bold;
            flex-basis: 45%;
        }
        input[type="number"], input[type="date"] {
            flex-basis: 35%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .rate-hint {
            flex-basis: 15%;
            text-align: right;
            font-size: 0.85em;
            color: #666;
        }
        button.save-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button.save-btn:hover {
            background-color: #2980b9;
        }
        .total-box {
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
        button.delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
        }
        button.delete-btn:hover {
            background-color: #c0392b;
        }
        .month-summary-row {
            font-weight: bold;
            background-color: #fdfefe;
        }
    </style>
</head>
<body>

    <h2>塾バイト給与計算アプリ</h2>

    <div class="total-box" id="monthlyTotalDisplay">
        現在の状況：計算中...
    </div>

    <div class="card">
        <h3>シフト入力</h3>
        <div class="input-group">
            <label>勤務日</label>
            <input type="date" id="workDate">
            <span class="rate-hint"></span>
        </div>
        <div class="input-group">
            <label>個別（1人）[h]</label>
            <input type="number" id="ind1" step="0.25" min="0" placeholder="0">
            <span class="rate-hint">1300円/h</span>
        </div>
        <div class="input-group">
            <label>個別（2人）[h]</label>
            <input type="number" id="ind2" step="0.25" min="0" placeholder="0">
            <span class="rate-hint">1800円/h</span>
        </div>
        <div class="input-group">
            <label>グループ学習[h]</label>
            <input type="number" id="group" step="0.25" min="0" placeholder="0">
            <span class="rate-hint">1300円/h</span>
        </div>
        <div class="input-group">
            <label>事務[h]</label>
            <input type="number" id="admin" step="0.25" min="0" placeholder="0">
            <span class="rate-hint">1250円/h</span>
        </div>
        <button class="save-btn" onclick="calculateAndSave()">記録して保存</button>
    </div>

    <div class="card">
        <h3>月別給与履歴</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>給料月</th>
                        <th>合計支給額</th>
                    </tr>
                </thead>
                <tbody id="monthSummaryBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>勤務詳細履歴</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>対象</th>
                        <th>個(1)</th>
                        <th>個(2)</th>
                        <th>集団</th>
                        <th>事務</th>
                        <th>日給</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const RATES = {
            ind1: 1300,
            ind2: 1800,
            group: 1300,
            admin: 1250
        };

        let records = JSON.parse(localStorage.getItem('jukuShiftRecords')) || [];

        function init() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('workDate').value = `${yyyy}-${mm}-${dd}`;
            
            updateDisplay();
        }

        // 10日締めに基づいた「給料月」を判定する関数
        function getSalaryMonth(dateStr) {
            const parts = dateStr.split('-');
            let year = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);

            // 11日以降の勤務は「翌月分の給料」になる
            if (day >= 11) {
                month += 1;
                if (month > 12) {
                    month = 1;
                    year += 1;
                }
            }
            return `${year}年${month}月分`;
        }

        function calculateAndSave() {
            const dateStr = document.getElementById('workDate').value;
            if(!dateStr) {
                alert('日付を入力してください。');
                return;
            }

            const h1 = parseFloat(document.getElementById('ind1').value) || 0;
            const h2 = parseFloat(document.getElementById('ind2').value) || 0;
            const hg = parseFloat(document.getElementById('group').value) || 0;
            const ha = parseFloat(document.getElementById('admin').value) || 0;

            if(h1 === 0 && h2 === 0 && hg === 0 && ha === 0) {
                alert('勤務時間を入力してください。');
                return;
            }

            const dailyTotal = (h1 * RATES.ind1) + (h2 * RATES.ind2) + (hg * RATES.group) + (ha * RATES.admin);

            const record = {
                id: Date.now(),
                date: dateStr,
                ind1: h1,
                ind2: h2,
                group: hg,
                admin: ha,
                total: dailyTotal
            };

            records.push(record);
            localStorage.setItem('jukuShiftRecords', JSON.stringify(records));

            document.getElementById('ind1').value = '';
            document.getElementById('ind2').value = '';
            document.getElementById('group').value = '';
            document.getElementById('admin').value = '';

            updateDisplay();
        }

        function updateDisplay() {
            const tbody = document.getElementById('historyBody');
            const monthTbody = document.getElementById('monthSummaryBody');
            tbody.innerHTML = '';
            monthTbody.innerHTML = '';

            // 月別集計用の連想配列
            const monthlyTotals = {};

            // 日付が新しい順にソート
            records.sort((a, b) => b.date.localeCompare(a.date));

            // データ集計と日ごと履歴の生成
            records.forEach(r => {
                const salaryMonth = getSalaryMonth(r.date);
                
                // 月別合計に加算
                if (!monthlyTotals[salaryMonth]) {
                    monthlyTotals[salaryMonth] = 0;
                }
                monthlyTotals[salaryMonth] += r.total;

                // 勤務詳細行
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.date.slice(5)}</td>
                    <td style="font-size:0.85em; color:#7f8c8d;">${salaryMonth.replace('分','')}</td>
                    <td>${r.ind1 > 0 ? r.ind1 : '-'}</td>
                    <td>${r.ind2 > 0 ? r.ind2 : '-'}</td>
                    <td>${r.group > 0 ? r.group : '-'}</td>
                    <td>${r.admin > 0 ? r.admin : '-'}</td>
                    <td>¥${r.total.toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteRecord(${r.id})">削</button></td>
                `;
                tbody.appendChild(tr);
            });

            // 月別給与履歴の生成（新しい月が上に来るように並び替え）
            const sortedMonths = Object.keys(monthlyTotals).sort((a, b) => b.localeCompare(a));
            sortedMonths.forEach(m => {
                const tr = document.createElement('tr');
                tr.className = 'month-summary-row';
                tr.innerHTML = `
                    <td>${m}</td>
                    <td style="color: #1abc9c;">¥${monthlyTotals[m].toLocaleString()}</td>
                `;
                monthTbody.appendChild(tr);
            });

            // 今日の日付から「現在進行中の給料月」を特定し、トップに表示
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const currentSalaryMonth = getSalaryMonth(todayStr);
            const currentMonthSum = monthlyTotals[currentSalaryMonth] || 0;

            document.getElementById('monthlyTotalDisplay').innerText = `現在の稼ぎ状況（${currentSalaryMonth}）：¥${currentMonthSum.toLocaleString()}`;
        }

        function deleteRecord(id) {
            if(confirm('この記録を削除してもよろしいですか？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('jukuShiftRecords', JSON.stringify(records));
                updateDisplay();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
